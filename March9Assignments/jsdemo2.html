<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
function add() {
    var total;
    var first = parseFloat(document.getElementsByName("first")[0].value);
    var second = parseFloat(document.getElementsByName("second")[0].value);

    total = first + second;

    alert("Total = " + total);
}
</script>

<pre>
1st Number : <input type="text" name="first" placeholder="enter 1st number"/>
2nd Number : <input type="text" name="second" placeholder="enter 2nd number"/>

<input type="button" value="sum" onclick="add()" />
</pre>
</body>
</html>
