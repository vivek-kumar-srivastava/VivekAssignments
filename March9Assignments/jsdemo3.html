<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div onClick="goodbye()" id="feedback" style="background-color: aqua; color: red; width: 90%; height: 500px; text-align: center; font-weight: 900;">
       
    </div>
    <script>
        document.getElementById("feedback").innerHTML = "Hello World";
     let goodbye = ()=>{
      
        var inputValue =  document.getElementById("feedback").innerHTML ;
        if(inputValue == "Goodbye"){
             document.getElementById("feedback").innerHTML = "Hii again";
        }else{
              document.getElementById("feedback").innerHTML = "Goodbye";
        }
     }
    </script>
    </body>
</html>
